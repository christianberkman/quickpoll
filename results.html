<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap 5 Minimal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        max-width: 720px;
        margin: auto;
      }
    </style>
  </head>

  <body>
    <header class="container mt-3">
      <h1 class="display-1">
        <i class="bi bi-clipboard-data-fill"></i> Quick Poll
      </h1>

      <nav>
        <button
          class="btn btn-outline-light w-100 mb-3 d-flex justify-content-between align-items-center"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseNav"
        >
          <span><i class="bi bi-clipboard-data-fill"></i> Results</span>
          <i class="bi bi-chevron-expand"></i>
        </button>

        <div class="collapse list-group" id="collapseNav">
          <a href="index.html" class="list-group-item list-group-item-action">
            <i class="bi bi-list"></i> Question and Options
          </a>
          <a href="buttons.html" class="list-group-item list-group-item-action">
            <i class="bi bi-gear-fill"></i> Poll
          </a>
          <a href="#" class="list-group-item list-group-item-action active">
            <i class="bi bi-clipboard-data-fill"></i> Results
          </a>
          <a
            href="settings.html"
            class="list-group-item list-group-item-action"
          >
            <i class="bi bi-gear-fill"></i> Settings
          </a>
        </div>
      </nav>
    </header>

    <main class="container mt-3">
      <div class="row mb-4 px-1">
        <h2 class="display-2 mb-0" id="questionHeading">Question</h2>
        <p class="text-secondary qp-total-count"></p>

        <div class="text-secondary text-center mb-2">
          <a href="#" class="text-reset" id="sortByLabelLink">Sort A-Z</a>
          <i class="bi bi-dot"></i>
          <a href="#" class="text-reset" id="sortByCountLink">Sort High-Low</a>
          <i class="bi bi-dot"></i>
          <a href="#" class="text-reset" id="copyResultsLink"
            >Copy to clipboard</a
          >
        </div>

        <div id="resultsContainer" class="list-group px-2 mb-3"></div>
      </div>
    </main>

    <template id="resultTemplate">
      <div
        class="list-group-item d-flex align-items-center justify-content-between qp-result"
        data-label=""
        data-count=""
      >
        <span class="fs-4 qp-label text-truncate"></span>
        <span class="badge text-bg-light fs-6 qp-count"></span>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="quickpoll.js"></script>
  </body>
</html>
