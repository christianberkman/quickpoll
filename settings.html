<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickPoll</title>
    <link href="/quickpoll/bootswatch-vapor.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/quickpoll/quickpoll.css" />
  </head>

  <body>
    <!-- navigation -->
    <nav class="navbar sticky-top py-3 px-2">
      <div class="container-fluid d-flex">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          class="btn"
          data-bs-toggle="offcanvas"
          data-bs-target="#navMenu"
        >
          <i class="bi bi-list text-white fs-3"></i>
        </button>
      </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="navMenu">
      <div class="offcanvas-header">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/index.html">
              <i class="bi bi-question-square-fill"></i> Question and Options
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/poll.html">
              <i class="bi bi-list"></i> Poll
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/adjust.html">
              <i class="bi bi-plus-slash-minus"></i> Adjust
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/results.html">
              <i class="bi bi-clipboard-data-fill"></i> Results
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active text-secondary" href="#">
              <i class="bi bi-gear-fill"></i> Settings
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- main-->
    <main class="container mt-3">
      <div class="row mb-4 px-1">
        <h2>Settings</h2>
        <div>
          <div class="form-check form-switch mb-1">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="showCounterSwitch"
              value="1"
            />
            <label class="form-check-label" for="showCounterSwitch"
              >Show counters on poll screen</label
            >
          </div>

          <div class="form check form-switch mb-1">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="wakeLockSwitch"
              value="1"
              switch
            />
            <label class="form-check-bale" for="wakeLockSwitch">
              Prevent sleep on poll screen
            </label>
          </div>

          <div class="form-check form-switch mb-1">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="beepSwitch"
              value="1"
            />
            <label class="form-check-label" for="beepSwitch"
              >Beep on button press</label
            >
          </div>

          <div class="form-check form-switch mb-3" id="vibrateSwitchContainer">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="vibrateSwitch"
              value="1"
            />
            <label class="form-check-label" for="vibrateSwitch"
              >Vibrate on button press</label
            >
          </div>

          <button
            id="resetButton"
            class="btn btn-outline-danger text-center w-100 mt-3 mb-3"
          >
            <i class="bi bi-trash"></i> Reset everything
          </button>

          <a
            href="/quickpoll/poll.html"
            class="btn btn-lg btn-outline-success w-100 qp-fullscreen-hide mb-3"
          >
            <i class="bi bi-list"></i> To Poll
          </a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/quickpoll/js/quickpoll.js"></script>
    <script src="/quickpoll/js/settings.js"></script>
  </body>
</html>
