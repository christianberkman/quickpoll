<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap 5 Minimal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="quickpoll.css">

  </head>

  <body>
    <header class="container mt-3">
      <h1 class="display-1">
        <i class="bi bi-clipboard-data-fill"></i> Quick Poll
      </h1>

      <nav>
        <button
          class="btn btn-outline-light w-100 mb-3 d-flex justify-content-between align-items-center"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseNav"
        >
          <span><i class="bi bi-gear-fill"></i> Settings</span>
          <i class="bi bi-chevron-expand"></i>
        </button>

        <div class="collapse list-group" id="collapseNav">
          <a href="index.html" class="list-group-item list-group-item-action">
            <i class="bi bi-list"></i> Question and Options
          </a>
          <a href="poll.html" class="list-group-item list-group-item-action">
            <i class="bi bi-gear-fill"></i> Poll
          </a>
          <a href="results.html" class="list-group-item list-group-item-action">
            <i class="bi bi-clipboard-data-fill"></i> Results
          </a>
          <a href="#" class="list-group-item list-group-item-action active">
            <i class="bi bi-gear-fill"></i> Settings
          </a>
        </div>
      </nav>
    </header>

    <main class="container mt-3">
      <div class="row mb-4 px-1">
        <h2>Settings</h2>
        <div>
          <div class="form-check form-switch mb-1">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="showCounterSwitch"
              value="1"
            />
            <label class="form-check-label" for="showCounterSwitch"
              >Show counter on buttons</label
            >
          </div>

          <div class="form-check form-switch mb-1">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="beepSwitch"
              value="1"
            />
            <label class="form-check-label" for="beepSwitch"
              >Beep on button press</label
            >
          </div>

          <div class="form-check form-switch mb-3">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="vibrateSwitch"
              value="1"
            />
            <label class="form-check-label" for="vibrateSwitch"
              >Vibrate on button press</label
            >
          </div>

          <button id="resetButton" class="btn btn-outline-danger text-center w-100">
            <i class="bi bi-trash"></i> Reset everything</i>
          </button>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="quickpoll.js"></script>
  </body>
</html>
