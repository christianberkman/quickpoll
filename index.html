<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickPoll</title>
    <link href="/quickpoll/bootswatch-vapor.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/quickpoll/quickpoll.css" />
  </head>

  <body>
    <!-- navigation -->
    <nav class="navbar sticky-top py-3 px-2">
      <div class="container-fluid d-flex">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          class="btn"
          data-bs-toggle="offcanvas"
          data-bs-target="#navMenu"
        >
          <i class="bi bi-list text-white fs-3"></i>
        </button>
      </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="navMenu">
      <div class="offcanvas-header">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link active text-secondary" href="#">
              <i class="bi bi-question-square-fill"></i> Question and Options
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/poll.html">
              <i class="bi bi-list"></i> Poll
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/adjust.html">
              <i class="bi bi-plus-slash-minus"></i> Adjust
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/results.html">
              <i class="bi bi-clipboard-data-fill"></i> Results
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/settings.html">
              <i class="bi bi-gear-fill"></i> Settings
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- main-->
    <main class="container mt-3 mb-3">
      <div class="row mb-3 px-1">
        <h1 class="display-5 text-center mb-3">
          A quick, in-person poll on one device. Set up in seconds.
        </h1>
        <p class="lead text-center">
          Works offline, nothing leaves the room.<br />
        </p>
      </div>
      <!--/row hero-->

      <div class="row mb-3 px-1">
        <div class="mb-3">
          <input
            class="form-control form-control-lg"
            id="questionInput"
            placeholder="Your question..."
          />
        </div>

        <div>
          <a
            href="/quickpoll/question.html"
            class="btn btn-lg btn-success text-black w-100 disabled"
            id="startPollButton"
          >
            Get started <i class="bi bi-arrow-right-circle"></i>
          </a>
        </div>
      </div>
      <!--/row cta-->

      <div class="row px-1">
        <p class="text-center">
          <span class="me-2 text-nowrap"
            ><i class="bi bi-x"></i> No signup</span
          >
          <span class="me-2 text-nowrap"><i class="bi bi-x"></i> No login</span>
          <span class="me-2 text-nowrap"><i class="bi bi-x"></i> No cloud</span>
          <span class="me-2 text-nowrap"><i class="bi bi-x"></i> No ads</span
          ><br />
          <span class="text-nowrap"
            ><i class="bi bi-check"></i> Completely offline
          </span>
          <span class="text-nowrap"
            ><i class="bi bi-check"></i> Open Source
          </span>
        </p>
      </div>
      <!--/row trust-->
    </main>

    <footer class="container mb-3">
      <hr />
      <p class="text-center">
        <span class="text-nowrap">
          <a
            href="https://github.com/christianberkman/quickpoll/"
            class="text-reset muted text-decoration-none"
          >
            <i class="bi bi-github"></i> Github
          </a>
        </span>
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/quickpoll/js/quickpoll.js"></script>
    <script src="/quickpoll/js/index.js"></script>
  </body>
</html>
