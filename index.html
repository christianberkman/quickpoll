<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap 5 Minimal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        max-width: 720px;
        margin: auto;
      }
    </style>
  </head>

  <body>
    <header class="container mt-3">
      <h1 class="display-1">
        <i class="bi bi-clipboard-data-fill"></i> Quick Poll
      </h1>

      <nav>
        <button
          class="btn btn-outline-light w-100 mb-3 d-flex justify-content-between align-items-center"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseNav"
        >
          <span><i class="bi bi-list"></i> Questions and Options</span>
          <i class="bi bi-chevron-expand"></i>
        </button>

        <div class="collapse list-group" id="collapseNav">
          <a href="#" class="list-group-item list-group-item-action active">
            <i class="bi bi-list"></i> Question and Options
          </a>
          <a href="poll.html" class="list-group-item list-group-item-action">
            <i class="bi bi-gear-fill"></i> Poll
          </a>
          <a href="results.html" class="list-group-item list-group-item-action">
            <i class="bi bi-clipboard-data-fill"></i> Results
          </a>
          <a
            href="settings.html"
            class="list-group-item list-group-item-action"
          >
            <i class="bi bi-gear-fill"></i> Settings
          </a>
        </div>
      </nav>
    </header>

    <main class="container mt-3">
      <div class="row mb-4 px-1">
        <h2>Question</h2>
        <div>
          <input
            class="form-control form-control-lg"
            id="questionInput"
            placeholder="Your question..."
          />
        </div>
      </div>

      <div class="row mb-4 px-1">
        <h2>Options</h2>
        <div id="optionsContainer"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <template id="optionTemplate">
      <div class="qp-option-input">
        <input type="hidden" class="qp-option-count" value="0" />
        <div class="input-group mb-3">
          <input
            type="text"
            class="form-control form-control-lg qp-option-label"
            placeholder="New option"
            maxlength="64"
            required
          />
          <button class="btn qp-button-class" data-button-class="">
            <i class="bi bi-droplet-fill"></i>
          </button>
          <button
            class="btn btn-outline-danger qp-delete-option"
            type="button"
            tabindex="-1"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </template>
    <script src="quickpoll.js"></script>
  </body>
</html>
