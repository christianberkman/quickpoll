<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickPoll</title>
    <link href="/quickpoll/bootswatch-vapor.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/quickpoll/quickpoll.css" />
  </head>

  <body>
    <!-- navigation -->
    <nav class="navbar sticky-top py-3 px-2">
      <div class="container-fluid d-flex">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          class="btn"
          data-bs-toggle="offcanvas"
          data-bs-target="#navMenu"
        >
          <i class="bi bi-list text-white fs-3"></i>
        </button>
      </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="navMenu">
      <div class="offcanvas-header">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a
              class="nav-link active text-secondary"
              href="#"
            >
              <i class="bi bi-question-square-fill"></i> Question and Options
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/poll.html">
              <i class="bi bi-list"></i> Poll
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/results.html">
              <i class="bi bi-clipboard-data-fill"></i> Results
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/settings.html">
              <i class="bi bi-gear-fill"></i> Settings
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- main-->
    <main class="container mt-3 mb-3">
      <div class="row mb-3 px-1">
        <h2>Question</h2>
        <div>
          <input
            class="form-control form-control-lg"
            id="questionInput"
            placeholder="Your question..."
          />
        </div>
      </div>

      <div class="row mb-2 px-1">
        <h2>Options</h2>
        <div id="optionsContainer"></div>
      </div>

      <div>
        <a
          href="/quickpoll/poll.html"
          class="btn btn-lg btn-success text-black w-100 disabled"
          id="startPollButton"
        >
          <i class="bi bi-list"></i> Start Poll
        </a>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <template id="optionTemplate">
      <div class="qp-option-input">
        <input type="hidden" class="qp-option-count" value="0" />
        <div class="input-group mb-3">
          <input
            type="text"
            class="form-control form-control-lg qp-option-label"
            placeholder="New option"
            maxlength="64"
            required
          />
          <button
            class="btn btn-sm qp-button-class"
            data-button-class=""
            tabindex="-1"
          >
            <i class="bi bi-droplet-fill"></i>
          </button>
          <button
            class="btn btn-outline-danger qp-delete-option"
            type="button"
            tabindex="-1"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </template>
    <script src="/quickpoll/js/quickpoll.js"></script>
    <script src="/quickpoll/js/index.js"></script>
  </body>
</html>
