<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap 5 Minimal</title>
    <link
      href="/quickpoll/bootswatch-vapor.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/quickpoll/quickpoll.css" />
    <style></style>
  </head>

  <body class="">
    <header class="container mt-3">
      <h1 class="display-1">
        <i class="bi bi-clipboard-data-fill"></i> Quick Poll
      </h1>

      <nav>
        <button
          class="btn btn-outline-light w-100 mb-3 d-flex justify-content-between align-items-center"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapseNav"
        >
          <span><i class="bi bi-list"></i> Poll</span>
          <i class="bi bi-chevron-expand"></i>
        </button>

        <div class="collapse list-group" id="collapseNav">
          <a href="/quickpoll/index.html" class="list-group-item list-group-item-action">
            <i class="bi bi-list"></i> Question and Options
          </a>
          <a href="#" class="list-group-item list-group-item-action active">
            <i class="bi bi-gear-fill"></i> Poll
          </a>
          <a href="/quickpoll/results.html" class="list-group-item list-group-item-action">
            <i class="bi bi-clipboard-data-fill"></i> Results
          </a>
          <a
            href="/quickpoll/settings.html"
            class="list-group-item list-group-item-action"
          >
            <i class="bi bi-gear-fill"></i> Settings
          </a>
        </div>
      </nav>
    </header>

    <main
      class="container mt-3 d-flex flex-column"
      style="flex: 1 1 auto; min-height: 0"
    >
      <div class="row mb-4 sticky-top px-1 border-bottom border-1 border-light">
        <h2 class="display-2 mb-0 qp-question-text">Question</h2>
      </div>

      <div id="buttonsContainer" class="d-flex flex-column px-1"></div>
      <p id="totalCountDisplay"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <template id="buttonTemplate">
      <button
        class="btn bt mb-2 qp-button d-flex align-items-center"
        data-index=""
        data-count=""
      >
        <span
          class="qp-label fs-2 flex-grow-1 text-center text-truncate"
        ></span>
        <span class="badge fs-6 bg-light text-black qp-count"></span>
      </button>
    </template>
    <script src="/quickpoll/js/quickpoll.js"></script>
    <script src="/quickpoll/js/poll.js"></script>
    <script></script>
  </body>
</html>
