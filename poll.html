<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickPoll</title>
    <link href="/quickpoll/bootswatch-vapor.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/quickpoll/quickpoll.css" />
    <style></style>
  </head>

  <body class="">
    <!-- navigation -->
    <nav class="navbar sticky-top py-3 px-2">
      <div class="container-fluid d-flex">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <span>
          <button class="btn" id="fullscreenButton">
            <i class="bi bi-arrows-fullscreen"></i>
          </button>

          <button
            class="btn"
            data-bs-toggle="offcanvas"
            data-bs-target="#navMenu"
          >
            <i class="bi bi-list text-white fs-3"></i>
          </button>
        </span>
      </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="navMenu">
      <div class="offcanvas-header">
        <h1 class="display-6 fs-3 fw-bold m-0">
          <i class="bi bi-clipboard-data-fill"></i> Quickpoll
        </h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/index.html">
              <i class="bi bi-question-square-fill"></i> Question and Options
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active text-secondary" href="#">
              <i class="bi bi-list"></i> Poll
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/adjust.html">
              <i class="bi bi-plus-slash-minus"></i> Adjust
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/results.html">
              <i class="bi bi-clipboard-data-fill"></i> Results
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/quickpoll/settings.html">
              <i class="bi bi-gear-fill"></i> Settings
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- main-->

    <main class="container mb-3 qp-flex-container" id="fullscreenContainer">
      <div class="row mb-4 sticky-top px-1">
        <h2 class="display-1 mb-2 qp-question-text text-center">Question</h2>
      </div>

      <div id="buttonsContainer" class="d-flex flex-column px-1 mb-3"></div>

      <p
        id="totalCountContainer"
        class="qp-fullscreen-hide text-secondary text-center"
      >
        Total count: <span class="qp-total-count"></span>
      </p>

      <a
        href="/quickpoll/results.html"
        class="btn btn-lg btn-outline-success w-100 qp-fullscreen-hide mb-3"
      >
        <i class="bi bi-clipboard-data-fill"></i> View Results
      </a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <template id="buttonTemplate">
      <button
        class="btn bt mb-2 qp-button d-flex align-items-center"
        data-index=""
        data-count=""
      >
        <span
          class="qp-label fs-2 flex-grow-1 text-center text-truncate"
        ></span>
        <span class="badge fs-6 bg-light text-black qp-count"></span>
      </button>
    </template>
    <script src="/quickpoll/js/quickpoll.js"></script>
    <script src="/quickpoll/js/poll.js"></script>
    <script></script>
  </body>
</html>
